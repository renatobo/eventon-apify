name: PHP Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    strategy:
      matrix:
        php-version: ['8.0', '8.3', '8.5']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Lint PHP sources
        run: |
          set -e
          for file in eventon-apify.php uninstall.php includes/*.php; do
            php -l "$file"
          done

      - name: Run unit suite
        run: php tests/php/run.php

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up PHP, Composer, and coverage
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: xdebug
          tools: composer:v2

      - name: Install quality tooling
        run: composer install --no-interaction --prefer-dist

      - name: Check WordPress coding standards
        run: composer lint

      - name: Run static analysis
        run: composer analyse

      - name: Enforce RSVP helper performance budget
        run: composer performance

      - name: Generate and enforce coverage report
        env:
          XDEBUG_MODE: coverage
          EVENTON_APIFY_MIN_COVERAGE: '10'
        run: composer coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: php-line-coverage
          path: coverage.json
          if-no-files-found: error

  wordpress-7-integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          tools: wp-cli

      - name: Install WordPress 7.0.2
        run: |
          mkdir "$RUNNER_TEMP/wordpress"
          wp core download --version=7.0.2 --path="$RUNNER_TEMP/wordpress"
          wp config create --path="$RUNNER_TEMP/wordpress" --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --dbhost=127.0.0.1:3306
          wp core install --path="$RUNNER_TEMP/wordpress" --url=http://localhost --title="EventON APIfy CI" --admin_user=admin --admin_password=admin-password --admin_email=admin@example.com
          ln -s "$GITHUB_WORKSPACE" "$RUNNER_TEMP/wordpress/wp-content/plugins/eventon-apify"
          wp plugin activate eventon-apify --path="$RUNNER_TEMP/wordpress"

      - name: Run WordPress REST integration smoke
        run: wp eval-file "$GITHUB_WORKSPACE/tests/integration/wp-rest-smoke.php" --path="$RUNNER_TEMP/wordpress"
